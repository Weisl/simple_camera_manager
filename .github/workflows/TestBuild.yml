name: Test Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          path: ${{ github.event.repository.name }}

      - name: Read version from blender_manifest.toml
        id: version
        run: |
          VERSION=$(python3 -c "import tomllib; f=open('${{ github.event.repository.name }}/blender_manifest.toml','rb'); print(tomllib.load(f)['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Set short SHA
        id: vars
        run: echo "short_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Zip Repository (excludes hidden dirs, venv, tests)
        run: |
          zip -r simple_camera_manager${{ steps.version.outputs.version }}_${{ steps.vars.outputs.short_sha }}.zip \
            ${{ github.event.repository.name }} \
            -x "${{ github.event.repository.name }}/.git*" \
            -x "${{ github.event.repository.name }}/.*/*" \
            -x "${{ github.event.repository.name }}/tests/*" \
            -x "${{ github.event.repository.name }}/venv/*"

      - name: Upload zip as artifact
        uses: actions/upload-artifact@v4
        with:
          name: simple_camera_manager_${{ steps.version.outputs.version }}_${{ steps.vars.outputs.short_sha }}
          path: simple_camera_manager_${{ steps.version.outputs.version }}_${{ steps.vars.outputs.short_sha }}.zip
          retention-days: 7